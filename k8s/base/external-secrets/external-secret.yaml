apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: application
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: SecretStore
  target:
    name: db-credentials
    creationPolicy: Owner
  data:
  - secretKey: username
    remoteRef:
      key: db-credentials-username
  - secretKey: password
    remoteRef:
      key: db-credentials-password
  - secretKey: host
    remoteRef:
      key: db-credentials-host
  - secretKey: port
    remoteRef:
      key: db-credentials-port
  - secretKey: database
    remoteRef:
      key: db-credentials-database
  - secretKey: url
    remoteRef:
      key: db-credentials-url

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: application
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: SecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
  - secretKey: jwt_secret
    remoteRef:
      key: app-secrets-jwt-secret
  - secretKey: api_key
    remoteRef:
      key: app-secrets-api-key
  - secretKey: cors_allowed_origins
    remoteRef:
      key: app-secrets-cors-allowed-origins